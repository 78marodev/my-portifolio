<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my Portfolio</title>
    <style>
        /* Base styles matching the layout directly */
        body {
            background-color: #2563eb; /* Strong solid blue background */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Pure white container box */
        .card {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Circle placeholder layout for user image upload */
        .avatar-container {
            width: 90px;
            height: 90px;
            background-color: #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Typography matches structural sizing from image layout */
        h1 {
            font-size: 24px;
            color: #000000;
            margin: 0 0 8px 0;
            font-weight: bold;
        }

        p {
            font-size: 14px;
            color: #64748b;
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        /* Large blue primary click button */
        .btn {
            display: block;
            width: 100%;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Tiny link block alignment */
        .footer-text {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .link {
            font-size: 13px;
            color: #2563eb;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-container">
            <!-- Points cleanly to your uploaded file -->
            <img src="photo.png" alt="Martin">
        </div>
        
        <h1>Martin</h1>
        <p>Cybersecurity Developer passionate about building edr and Analyze in siem ex: kql.</p>
        
        <a href="mailto:marinesp32dev@gmail.com" class="btn">Contact Me</a>
        
        <div class="footer-text">Favorite Website</div>
        <a href="https://deci.gov.eg" class="link">https://moodlelearning.moodiy.club/login</a>
    </div>

</body>
</html>
